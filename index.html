<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Father's Day Dad ❤️</title>
<style>
body{
font-family:Arial,sans-serif;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#f8f9fa,#e9ecef);
text-align:center;
padding:20px;
}
.card{
max-width:700px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}
h1{margin-top:0}
.idea{
font-size:1.2rem;
margin:20px 0;
min-height:60px;
}
button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:1rem;
}
</style>
</head>
<body>
<div class="card">
<h1>Happy Father's Day, Dad ❤️</h1>
<p>Thank you for being my guide, protector, and biggest supporter.</p>

<div class="idea" id="idea"></div>

<button onclick="nextIdea()">Show Another Father's Day Idea</button>

<p style="margin-top:25px;font-size:.9rem;color:#666;">
Made with love for the world's best Dad.
</p>
</div>

<script>
const ideas=[
"📸 Recreate an old family photo together.",
"🍽️ Take Dad out for his favorite meal.",
"🎥 Create a short video of family memories.",
"✉️ Write Dad a heartfelt letter.",
"🚗 Go on a surprise road trip.",
"🎮 Have a father-child game night.",
"📚 Make a scrapbook of your favorite moments.",
"☕ Spend an uninterrupted morning together."
];

let index=0;
function nextIdea(){
document.getElementById('idea').innerHTML=ideas[index];
index=(index+1)%ideas.length;
}
nextIdea();
</script>
</body>
</html>
